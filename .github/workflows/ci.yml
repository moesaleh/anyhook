name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN needs `packages: write` to push images to GHCR. The publish
# job additionally needs `security-events: write` so the Trivy scan can upload
# SARIF to the Security tab, and `id-token: write` so cosign can keyless-sign
# (only used when COSIGN_PRIVATE_KEY isn't set).
permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

jobs:
  # Lint + syntax-check the backend on every push & PR.
  backend-lint:
    name: Backend lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - name: Syntax-check all backend JS
        run: |
          set -e
          for f in $(find src -name '*.js'); do
            node --check "$f"
          done

  # Unit + integration tests. Integration suite needs a real Postgres;
  # provisioned as a service container. Redis is mocked in-memory and
  # Kafka is no-op'd by the integration harness, so we don't need
  # those services here.
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.2
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: anyhook_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      # `npm run test:coverage` is `jest --coverage`. The coverageThreshold in
      # jest.config.js makes jest exit non-zero when coverage drops below the
      # floor, and because this is a plain `run:` step that non-zero exit fails
      # the job. Do NOT wrap this in `|| true`, `continue-on-error`, or pipe it
      # into anything that masks the exit code — the threshold is the gate.
      - name: Run all tests with coverage (coverage threshold gates the job)
        run: npm run test:coverage
        env:
          # JWT helpers refuse to run with a short or missing secret.
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-jwt-secret-pad-to-32-characters' }}
          # When set, integration tests run against this PG; when unset,
          # they're skipped (see tests/integration/setup.js).
          TEST_DATABASE_URL: postgres://postgres:testpass@localhost:5432/anyhook_test

  # Lint + type-check + production build of the dashboard on every push & PR.
  dashboard-build:
    name: Dashboard lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npx eslint .
      - name: Type check
        run: npx tsc --noEmit
      - name: Unit tests (vitest)
        run: npm test
      - name: Build
        run: npx next build
        env:
          # Build-time inlined into the client bundle. CI has no real backend;
          # pick any string. Real deploys must override this in their env.
          NEXT_PUBLIC_API_URL: http://localhost:3001
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: E2E tests (Playwright)
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001

  # Build + push images to GHCR. Only runs on push to main (post-merge) and
  # on manual dispatch — never on pull_request events, so unmerged PRs can't
  # publish over :latest.
  publish:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-tests, dashboard-build]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # GITHUB_TOKEN is auto-provisioned by Actions and has packages:write
          # because of the workflow-level permissions block above. No PAT needed.
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        id: build-backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Both :latest and :sha-<commit> so we can roll back by re-tagging.
          tags: |
            ghcr.io/moesaleh/anyhook:latest
            ghcr.io/moesaleh/anyhook:sha-${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          # Emit an SPDX SBOM + provenance attestation alongside the image in
          # the registry (buildkit attaches these to the manifest). The
          # standalone anchore/sbom-action step below also publishes an SBOM as
          # a build artifact for consumers that don't read OCI attestations.
          sbom: true
          provenance: mode=max

      - name: Build & push dashboard image
        id: build-dashboard
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          file: ./dashboard/Dockerfile
          push: true
          tags: |
            ghcr.io/moesaleh/anyhook-dashboard:latest
            ghcr.io/moesaleh/anyhook-dashboard:sha-${{ github.sha }}
          cache-from: type=gha,scope=dashboard
          cache-to: type=gha,mode=max,scope=dashboard
          sbom: true
          provenance: mode=max

      # --- Supply-chain: vulnerability scan + SBOM + optional signing --------
      # Scan the just-pushed backend image. Fails the job on any fixable
      # HIGH/CRITICAL CVE so a vulnerable image can't progress to deploy.
      # `exit-code: 1` is what turns findings into a hard gate; `ignore-unfixed`
      # avoids failing on CVEs with no available patch (noise we can't action).
      - name: Scan backend image (Trivy, fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/moesaleh/anyhook:sha-${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          vuln-type: os,library

      - name: Scan dashboard image (Trivy, fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/moesaleh/anyhook-dashboard:sha-${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          vuln-type: os,library

      # SBOM as a downloadable artifact (SPDX JSON) for each image. Uses syft
      # under the hood; uploaded to the workflow run so it's retrievable for
      # audit / dependency-tracking ingestion.
      - name: Generate SBOM — backend (syft via anchore/sbom-action)
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/moesaleh/anyhook:sha-${{ github.sha }}
          format: spdx-json
          artifact-name: sbom-backend-spdx.json
          output-file: ${{ runner.temp }}/sbom-backend-spdx.json

      - name: Generate SBOM — dashboard (syft via anchore/sbom-action)
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/moesaleh/anyhook-dashboard:sha-${{ github.sha }}
          format: spdx-json
          artifact-name: sbom-dashboard-spdx.json
          output-file: ${{ runner.temp }}/sbom-dashboard-spdx.json

      # Optional image signing. Only runs when COSIGN_PRIVATE_KEY is configured;
      # the `if:` keeps the job green for forks/contributors without the secret.
      # We sign the immutable digests (not the mutable :sha-/:latest tags).
      - name: Check for cosign signing key
        id: cosign-key
        run: |
          if [ -n "${{ secrets.COSIGN_PRIVATE_KEY }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "COSIGN_PRIVATE_KEY not set — skipping image signing."
          fi

      - name: Install cosign
        if: steps.cosign-key.outputs.enabled == 'true'
        uses: sigstore/cosign-installer@v3

      - name: Sign + attest images (cosign)
        if: steps.cosign-key.outputs.enabled == 'true'
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          BACKEND_DIGEST: ${{ steps.build-backend.outputs.digest }}
          DASHBOARD_DIGEST: ${{ steps.build-dashboard.outputs.digest }}
        run: |
          set -euo pipefail
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY \
            "ghcr.io/moesaleh/anyhook@${BACKEND_DIGEST}"
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY \
            "ghcr.io/moesaleh/anyhook-dashboard@${DASHBOARD_DIGEST}"

  # Boot the just-published backend image against a real data tier and assert it
  # reaches "listening" (/health/live = 200) BEFORE the deploy gate. The publish
  # job builds + Trivy-scans the image but never RUNS it; this closes the P0-1 gap
  # (the production image once crash-looped on boot because node-pg-migrate was
  # pruned, and nothing in CI would have caught it). The boot path here is
  # identical to production: the one-shot `migrate` service applies the schema,
  # then Postgres/Redis/Kafka must go healthy, then subscription-management starts
  # — and it only calls app.listen() after all three deps connect.
  image-smoke:
    name: Smoke-test published image (boot to listening)
    runs-on: ubuntu-latest
    needs: [publish]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Minimal throwaway env for the ephemeral smoke stack. RUN_MIGRATIONS_ON_BOOT
      # stays false so the app takes the same "schema already current" path as a
      # real deploy (the one-shot `migrate` service runs the migrations first).
      # Data-tier hosts are the compose service names, reached over the network.
      - name: Write throwaway .env for the smoke stack
        run: |
          cat > .env <<'EOF'
          PORT=3001
          NODE_ENV=production
          JWT_SECRET=ci_smoke_only_jwt_secret_at_least_32_characters
          ADMIN_API_KEY=ci-smoke-admin-key
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=ci_smoke_pw
          POSTGRES_DB=subscriptions_db
          POSTGRES_PORT=5432
          DATABASE_URL=postgres://postgres:ci_smoke_pw@postgres:5432/subscriptions_db
          REDIS_PORT=6379
          REDIS_URL=redis://redis:6379
          KAFKA_PORT=9092
          KAFKA_HOST=kafka:9092
          KAFKA_NODE_ID=0
          KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
          KAFKA_QUORUM_VOTERS=0@kafka:9093
          RUN_MIGRATIONS_ON_BOOT=false
          EOF

      - name: Boot subscription-management from the :sha image
        env:
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          set -euo pipefail
          # --wait blocks until the one-shot `migrate` completes successfully AND
          # subscription-management's healthcheck (/health/live) goes green, or the
          # timeout trips and this step fails the job.
          docker compose up -d --wait --wait-timeout 240 subscription-management

      - name: Assert /health/live returns 200
        run: |
          set -euo pipefail
          for i in $(seq 1 20); do
            code="$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 http://localhost:3001/health/live || true)"
            if [ "$code" = "200" ]; then
              echo "published image reached listening (/health/live=200) on attempt $i"
              exit 0
            fi
            echo "attempt $i: /health/live -> ${code:-none}; retrying in 3s"
            sleep 3
          done
          echo "::error::published image never reached /health/live=200"
          exit 1

      - name: Dump stack logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=200 || true

      - name: Tear down
        if: always()
        env:
          IMAGE_TAG: sha-${{ github.sha }}
        run: docker compose down -v --remove-orphans || true

  # Gated production deploy. Runs only after a successful publish + image smoke
  # test, and only on push to main / manual dispatch. The `environment: production`
  # binding means GitHub holds this job until a required reviewer approves it; with
  # no reviewers/secrets configured it simply no-ops (every step is guarded on the
  # DEPLOY_SSH_HOST secret), so the workflow stays green out of the box.
  #
  # Flow: pull the :sha-<commit> images, run DB migrations as a discrete
  # one-shot step FIRST, then a health-gated rolling update with rollback.
  deploy:
    name: Deploy (production)
    runs-on: ubuntu-latest
    needs: [publish, image-smoke]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: production
    steps:
      - uses: actions/checkout@v4

      # Single switch the rest of the job reads. When DEPLOY_SSH_HOST is unset
      # (the default), `enabled=false` and every deploy step is skipped, so the
      # job is a no-op pass rather than a failure.
      - name: Resolve deploy target
        id: target
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          if [ -n "${DEPLOY_SSH_HOST:-}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Deploy target configured — proceeding with migrate + rollout."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "DEPLOY_SSH_HOST not set — skipping deploy (no-op)."
          fi
          if [ -n "${DATABASE_URL:-}" ]; then
            echo "has_db=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_db=false" >> "$GITHUB_OUTPUT"
            echo "::warning::DATABASE_URL not set — migration step will be skipped."
          fi

      # --- Step 1: migrations as a discrete pre-deploy step (P1-9) -----------
      # Run migrations exactly once per release BEFORE rolling the app pods, so
      # there's no multi-pod migrate race and a failed migration aborts the
      # deploy before any new app container starts. node-pg-migrate is a
      # devDependency (pruned from the runtime image), so we run it from a fresh
      # checkout via `npx` rather than inside the published image.
      - name: Set up Node for migrations
        if: steps.target.outputs.has_db == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install migration deps
        if: steps.target.outputs.has_db == 'true'
        run: npm ci

      - name: Run database migrations (npx node-pg-migrate up)
        if: steps.target.outputs.has_db == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx node-pg-migrate up

      # --- Step 2: health-gated rolling update over SSH (P2-10) --------------
      # Pull the immutable :sha-<commit> tag and `up -d` on the host, then poll
      # /health (readiness — probes Postgres + Redis). If it never goes green,
      # roll back to :latest and fail the deploy.
      #
      # Rollback note: images are also tagged :latest and :sha-<commit>; a bad
      # release can be reverted by re-deploying the previous commit's :sha tag
      # (re-run this job from that commit) or, on the host, repointing the
      # compose IMAGE_TAG to the last-known-good sha and `up -d`.
      - name: Configure SSH
        if: steps.target.outputs.enabled == 'true'
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Pull :sha images + rolling update + health gate
        if: steps.target.outputs.enabled == 'true'
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          # Directory on the host that holds docker-compose.yml + .env.
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          IMAGE_TAG: sha-${{ github.sha }}
          # Port /health listens on (subscription-management readiness).
          HEALTH_URL: ${{ secrets.DEPLOY_HEALTH_URL }}
        run: |
          set -euo pipefail
          DEPLOY_USER="${DEPLOY_SSH_USER:-deploy}"
          DEPLOY_DIR="${DEPLOY_PATH:-/opt/anyhook}"
          HEALTH="${HEALTH_URL:-http://localhost:3001/health}"

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            "${DEPLOY_USER}@${DEPLOY_SSH_HOST}" \
            "IMAGE_TAG='${IMAGE_TAG}' DEPLOY_DIR='${DEPLOY_DIR}' HEALTH='${HEALTH}' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "${DEPLOY_DIR}"

          # Record the currently-running backend tag so we can roll back.
          PREV_TAG="$(docker inspect --format '{{ index .Config.Image }}' anyhook-subscription 2>/dev/null || echo 'latest')"
          echo "Previous backend image: ${PREV_TAG}"

          # Pin compose to the new immutable tag, pull, and roll.
          export IMAGE_TAG
          docker compose pull
          docker compose up -d

          # Health gate: poll /health (readiness) for up to ~2 minutes.
          ok=0
          for i in $(seq 1 24); do
            if curl -fsS --max-time 5 "${HEALTH}" >/dev/null 2>&1; then
              ok=1
              echo "Health check passed on attempt ${i}."
              break
            fi
            echo "Health check attempt ${i} failed; retrying in 5s..."
            sleep 5
          done

          if [ "${ok}" -ne 1 ]; then
            echo "Health gate FAILED — rolling back to ${PREV_TAG}."
            export IMAGE_TAG="${PREV_TAG##*:}"
            docker compose pull
            docker compose up -d
            exit 1
          fi

          echo "Deploy succeeded; new images healthy."
          REMOTE

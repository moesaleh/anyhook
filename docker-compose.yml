version: '3.8'

# IMAGE_TAG selects which published backend image the three app services run.
# Defaults to :latest for a frictionless `docker compose up`, but CI/CD should
# pass an immutable tag (e.g. IMAGE_TAG=sha-<commit>) so a deploy pins to the
# exact artifact it tested -- a mutable :latest can silently drift between
# `pull` and `up`. The dashboard keeps its own tag (built locally here).
#
# Resource limits + restart back-off below are honored by `docker compose up`
# (Compose Spec) for deploy.resources.limits and deploy.replicas. The
# deploy.restart_policy block is only applied by Swarm/k8s translators (plain
# `docker compose up` uses the top-level `restart:`), so both are set: the
# top-level value caps local crash-loops, restart_policy carries the same
# intent to orchestrators. Limits are conservative starting points -- profile
# under load and raise as needed.

services:
  migrate:
    # One-shot schema migration job. Runs `npm run migrate` (node-pg-migrate)
    # once per release and EXITS -- it is not a long-running service, hence
    # `restart: "no"`. The app services gate their start on this completing
    # successfully (depends_on ... service_completed_successfully), so the
    # schema is guaranteed current before any API/worker pod boots. This
    # decouples migrations from app boot: no multi-pod migration race, and a
    # failed migration fails the deploy here instead of crash-looping every
    # API pod. Uses the same image as the app (node-pg-migrate now ships in
    # `dependencies`, so it survives the production prune).
    image: ghcr.io/moesaleh/anyhook:${IMAGE_TAG:-latest}
    restart: "no"
    command: npm run migrate
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.50"
    networks:
      - anyhook

  subscription-management:
    image: ghcr.io/moesaleh/anyhook:${IMAGE_TAG:-latest}
    container_name: anyhook-subscription
    restart: unless-stopped
    command: node /app/src/subscription-management/index.js
    env_file:
      - ./.env
    environment:
      # This is the only service that creates Kafka topics (createKafkaTopics
      # in src/subscription-management/index.js). Surface the topic-shape knobs
      # explicitly so a prod operator can set them via the shell environment
      # even when they're left commented out in .env. Defaults mirror the code
      # (8 partitions, RF=1). For prod HA see the kafka service notes below and
      # set KAFKA_REPLICATION_FACTOR>=3.
      - KAFKA_PARTITIONS=${KAFKA_PARTITIONS:-8}
      - KAFKA_REPLICATION_FACTOR=${KAFKA_REPLICATION_FACTOR:-1}
    ports:
      - "${PORT:-3001}:3001"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      # Liveness only — /health/live answers 200 as long as the Express
      # process is responsive. /health (readiness) probes Postgres +
      # Redis and returns 503 if either is down; a brief dep blip would
      # otherwise mark this container "unhealthy" and start cascading
      # restarts of the whole stack via depends_on.
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3001/health/live').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s
    networks:
      - anyhook

  subscription-connector:
    image: ghcr.io/moesaleh/anyhook:${IMAGE_TAG:-latest}
    # No container_name: this is a stateless Kafka consumer and MUST be
    # scalable. A fixed container_name makes `docker compose up --scale
    # subscription-connector=N` fail, pinning every partition to one pod
    # (one CPU core ceiling). Scale via replicas below or `--scale`; Kafka
    # rebalances partitions across the group. Keep replicas <= KAFKA_PARTITIONS
    # (default 8) -- extra consumers beyond the partition count sit idle.
    restart: unless-stopped
    command: node /app/src/subscription-connector/index.js
    env_file:
      - ./.env
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      subscription-management:
        condition: service_healthy
    healthcheck:
      # Hits the internal /health on the metrics server (port 9090 by default).
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:9090/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      # Tunable: raise to scale out consumers (up to KAFKA_PARTITIONS).
      replicas: 1
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s
    networks:
      - anyhook

  webhook-dispatcher:
    image: ghcr.io/moesaleh/anyhook:${IMAGE_TAG:-latest}
    # No container_name: stateless Kafka consumer, same scaling story as
    # subscription-connector above. Scale via replicas / `--scale`; keep
    # replicas <= KAFKA_PARTITIONS.
    restart: unless-stopped
    command: node /app/src/webhook-dispatcher/index.js
    env_file:
      - ./.env
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      subscription-management:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:9090/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      # Tunable: raise to scale out delivery workers (up to KAFKA_PARTITIONS).
      replicas: 1
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s
    networks:
      - anyhook

  dashboard:
    image: ghcr.io/moesaleh/anyhook-dashboard:latest
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: anyhook-dashboard
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    depends_on:
      subscription-management:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s
    networks:
      - anyhook

  # Data services (Postgres / Redis / Kafka) bind their published ports
  # to 127.0.0.1 by default so they're reachable for local dev tooling
  # but NOT exposed on the public network interface. Override with
  # DATA_BIND=0.0.0.0 if you actually need external access (and lock
  # down credentials accordingly). The `${VAR:-default}` shell pattern
  # keeps the compose-spec port string parseable.
  postgres:
    image: 'postgres:17.2'
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-subscriptions_db}
    ports:
      - "${DATA_BIND:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          # Data tier gets a larger ceiling than the workers; Postgres needs
          # headroom for shared_buffers + work_mem under real load.
          memory: 1G
          cpus: "2.0"
    networks:
      - anyhook

  redis:
    image: 'redis:7.4.5'
    container_name: redis
    restart: unless-stopped
    ports:
      - "${DATA_BIND:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    networks:
      - anyhook

  # ---------------------------------------------------------------------------
  # Kafka — SINGLE-NODE DEV DEFAULT.
  #
  # This is one KRaft combined controller+broker node. It is fine for local
  # development and CI but is a single point of failure with NO data durability
  # guarantees: with one broker the topic replication factor can only be 1
  # (KAFKA_REPLICATION_FACTOR=1, the code default), so a broker loss loses
  # in-flight events and `min.insync.replicas` cannot protect a producer.
  #
  # PRODUCTION TOPOLOGY (do NOT run the single-node config below in prod):
  #   * Run a 3-broker KRaft quorum (3 controller voters) so the cluster
  #     tolerates the loss of one node. Set KAFKA_QUORUM_VOTERS to all three,
  #     give each a distinct KAFKA_NODE_ID, and use unique advertised listeners.
  #   * Create topics with replication factor >= 3:
  #       KAFKA_REPLICATION_FACTOR=3   (passed through to subscription-management)
  #   * Require at least 2 in-sync replicas to acknowledge a write:
  #       KAFKA_CFG_MIN_INSYNC_REPLICAS=2   (per broker)
  #     paired with producers using acks=all + idempotent=true (see P1-8 in the
  #     fix plan; producer-side change lives in the app, not here) so the outbox
  #     gets true end-to-end at-least-once durability and survives one broker
  #     loss without dropping acknowledged events.
  #   * Set KAFKA_PARTITIONS to comfortably exceed your max consumer replica
  #     count per stage (default 8). Replicas beyond the partition count idle.
  #
  # A real multi-broker cluster is usually run outside compose (managed Kafka /
  # MSK / a dedicated StatefulSet); this block intentionally stays single-node
  # so `docker compose up` works out of the box for development.
  # ---------------------------------------------------------------------------
  kafka:
    # Apache's official upstream image. NOTE (2025): the previous
    # `bitnami/kafka:3.9.1` tag was removed from Docker Hub (Bitnami retired its
    # free versioned catalog), so `docker pull bitnami/kafka:3.9.1` now fails
    # with "manifest unknown" — any deploy that pulled it would break. apache/kafka
    # is the maintained, always-available image. Differences from the old Bitnami
    # config: env vars use the bare KAFKA_ prefix (NOT Bitnami's KAFKA_CFG_), the
    # broker scripts live under /opt/kafka/bin (not on PATH), advertised listeners
    # must be set explicitly, and the single-broker internal topics must be forced
    # to RF=1 (the image defaults to 3). Still a SINGLE-NODE KRaft dev/CI broker
    # — see the PRODUCTION TOPOLOGY notes above.
    image: apache/kafka:3.9.1
    container_name: kafka
    # Kafka, like Postgres + Redis, defaults to 127.0.0.1 binding.
    restart: unless-stopped
    ports:
      - "${DATA_BIND:-127.0.0.1}:${KAFKA_PORT:-9092}:9092"
    environment:
      - KAFKA_NODE_ID=${KAFKA_NODE_ID:-0}
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_LISTENERS=${KAFKA_LISTENERS:-PLAINTEXT://:9092,CONTROLLER://:9093}
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=${KAFKA_PROTOCOL_MAP:-CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT}
      - KAFKA_CONTROLLER_QUORUM_VOTERS=${KAFKA_QUORUM_VOTERS:-0@kafka:9093}
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      # In-network clients (the three app services connect via KAFKA_HOST=kafka:9092)
      # reach the broker by its compose service name, so advertise exactly that.
      - KAFKA_ADVERTISED_LISTENERS=${KAFKA_ADVERTISED_LISTENERS:-PLAINTEXT://kafka:9092}
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      # Single broker ⇒ the internal topics can only have one replica (the image
      # defaults to 3, which would block group coordination on one node).
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    # No named volume: this single-node dev/CI broker is explicitly ephemeral
    # (the PRODUCTION TOPOLOGY notes above already disclaim durability).
    # apache/kafka writes to /tmp/kraft-combined-logs by default; topics are
    # recreated on subscription-management boot and the outbox + processed_events
    # dedup tolerate consumer-offset resets across a restart.
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
    networks:
      - anyhook
    healthcheck:
      # apache/kafka ships the broker scripts under /opt/kafka/bin (not on PATH);
      # non-zero exit until the broker is accepting requests.
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s

volumes:
  postgres_data:
  redis_data:

networks:
  anyhook:

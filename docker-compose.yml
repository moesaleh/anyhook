version: '3.8'

services:
  subscription-management:
    image: ghcr.io/swanblocks-inc/anyhook:latest
    container_name: anyhook-subscription
    restart: unless-stopped
    command: node /app/src/subscription-management/index.js
    env_file:
      - ./.env
    ports:
      - "${PORT:-3001}:3001"
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - anyhook

  subscription-connector:
    image: ghcr.io/swanblocks-inc/anyhook:latest
    container_name: anyhook-connector
    restart: unless-stopped
    command: node /app/src/subscription-connector/index.js
    env_file:
      - ./.env
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - anyhook

  webhook-dispatcher:
    image: ghcr.io/swanblocks-inc/anyhook:latest
    container_name: anyhook-dispatcher
    restart: unless-stopped
    command: node /app/src/webhook-dispatcher/index.js
    env_file:
      - ./.env
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - anyhook

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: anyhook-dashboard
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    depends_on:
      - subscription-management
    networks:
      - anyhook

  postgres:
    image: 'postgres:14.4'
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-subscriptions_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - anyhook

  redis:
    image: 'redis:7.0.7'
    container_name: redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - anyhook
      
  kafka:
    image: bitnami/kafka:3.8.0
    container_name: kafka
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      - KAFKA_CFG_NODE_ID=${KAFKA_NODE_ID:-0}
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=${KAFKA_LISTENERS:-PLAINTEXT://:9092,CONTROLLER://:9093}
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=${KAFKA_PROTOCOL_MAP:-CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT}
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=${KAFKA_QUORUM_VOTERS:-0@kafka:9093}
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - anyhook

volumes:
  postgres_data:
  redis_data:
  kafka_data:

networks:
  anyhook:

version: '3.8'

services:
  subscription-management:
    image: ghcr.io/moesaleh/anyhook:latest
    container_name: anyhook-subscription
    restart: unless-stopped
    command: node /app/src/subscription-management/index.js
    env_file:
      - ./.env
    ports:
      - "${PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      # Node 22 has fetch built in. Hits the /health endpoint, exits non-zero
      # on non-2xx so unhealthy goes to 'degraded' (status 503).
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - anyhook

  subscription-connector:
    image: ghcr.io/moesaleh/anyhook:latest
    container_name: anyhook-connector
    restart: unless-stopped
    command: node /app/src/subscription-connector/index.js
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      subscription-management:
        condition: service_healthy
    networks:
      - anyhook

  webhook-dispatcher:
    image: ghcr.io/moesaleh/anyhook:latest
    container_name: anyhook-dispatcher
    restart: unless-stopped
    command: node /app/src/webhook-dispatcher/index.js
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      subscription-management:
        condition: service_healthy
    networks:
      - anyhook

  dashboard:
    image: ghcr.io/moesaleh/anyhook-dashboard:latest
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: anyhook-dashboard
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    depends_on:
      subscription-management:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - anyhook

  postgres:
    image: 'postgres:14.18'
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-subscriptions_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - anyhook

  redis:
    image: 'redis:7.4.5'
    container_name: redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - anyhook

  kafka:
    image: bitnami/kafka:3.9.1
    container_name: kafka
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      - KAFKA_CFG_NODE_ID=${KAFKA_NODE_ID:-0}
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=${KAFKA_LISTENERS:-PLAINTEXT://:9092,CONTROLLER://:9093}
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=${KAFKA_PROTOCOL_MAP:-CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT}
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=${KAFKA_QUORUM_VOTERS:-0@kafka:9093}
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      # bitnami kafka ships with kafka-broker-api-versions.sh; non-zero exit
      # if the broker isn't accepting requests yet.
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    networks:
      - anyhook

volumes:
  postgres_data:
  redis_data:
  kafka_data:

networks:
  anyhook:
